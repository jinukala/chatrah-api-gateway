quarkus.http.port=8080

# Backend URL (ONLY gateway talks to backend)
chatrah.backend.base-url=http://localhost:8081
chatrah.gateway.secret=${GATEWAY_SECRET:dev-secret-local}

# JWT
mp.jwt.verify.publickey.location=META-INF/publicKey.pem
mp.jwt.verify.issuer=chatrah-school

# CORS - restrict to your frontend origin(s)
quarkus.http.cors=true
quarkus.http.cors.origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173}
quarkus.http.cors.methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=Authorization,Content-Type,Accept
quarkus.http.cors.exposed-headers=X-Request-Id
quarkus.http.cors.access-control-max-age=24H

# Request body size limit (1MB)
quarkus.http.limits.max-body-size=1M

quarkus.log.console.json=true
